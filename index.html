<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f2f3f7">
  <title>Секундомер</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="top-bar">
      <h1>Секундомер</h1>
      <div class="menu-wrap">
        <button id="menuButton" class="menu-btn" aria-label="Открыть меню" title="Меню">⋮</button>
        <div id="popupMenu" class="popup-menu" hidden>
          <button id="openSettings" class="popup-item" type="button">Настройки</button>
        </div>
      </div>
    </header>

    <section class="display-wrap" aria-live="polite">
      <div id="timeDisplay" class="time-display">00:00,00</div>
    </section>

    <section class="controls">
      <button id="resetButton" class="btn btn-secondary" disabled>Интервал</button>
      <button id="mainButton" class="btn btn-primary">Начать</button>
    </section>

    <nav class="bottom-nav" aria-label="Разделы часов">
      <div class="nav-item">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.5 4.7a1 1 0 0 1 1.4 0l1.4 1.4a8 8 0 0 1 5.4 0l1.4-1.4a1 1 0 1 1 1.4 1.4l-1.2 1.2A8 8 0 1 1 4.9 7.3l-1.2-1.2a1 1 0 0 1 1.4-1.4l1.4 1.4Z M12 9a1 1 0 0 1 1 1v3.4l2.1 1.2a1 1 0 0 1-1 1.8l-2.6-1.5a1 1 0 0 1-.5-.9V10a1 1 0 0 1 1-1Z"/></svg>
        <span>Будильник</span>
      </div>
      <div class="nav-item">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a8 8 0 1 1-5.7 13.6l-.8 2.4 2.5-.7A8 8 0 1 1 12 2Zm0 2a6 6 0 0 0-4.8 9.6l.4.5-.3 1 1-.3.5.4A6 6 0 1 0 12 4Zm.7 3.4a1 1 0 0 1 .9 1v2.5l1.8 1.1a1 1 0 0 1-1 1.8l-2.3-1.4a1 1 0 0 1-.5-.9V8.4a1 1 0 0 1 1-1Z"/></svg>
        <span>Мир. время</span>
      </div>
      <div class="nav-item active">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 2h6a1 1 0 1 1 0 2h-1v2.2A7.2 7.2 0 1 1 10 6.2V4H9a1 1 0 1 1 0-2Zm3 6.3a1 1 0 0 1 1 1v3.3a1 1 0 1 1-2 0V9.3a1 1 0 0 1 1-1Zm0 10a5.2 5.2 0 1 0 0-10.4 5.2 5.2 0 0 0 0 10.4Z"/></svg>
        <span>Секундомер</span>
      </div>
      <div id="timerButton" class="nav-item" role="button" aria-label="Сбросить порядок подмены" title="Сбросить порядок подмены">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 2h10a1 1 0 0 1 .8 1.6L13.2 10l4.6 6.4A1 1 0 0 1 17 18H7a1 1 0 0 1-.8-1.6L10.8 10 6.2 3.6A1 1 0 0 1 7 2Zm1.9 2 4 5.5a1 1 0 0 1 0 1.2l-4 5.3h6.2l-3.7-5.2a1 1 0 0 1 0-1.2L15.1 4H8.9Z"/></svg>
        <span>Таймер</span>
      </div>
    </nav>
  </main>

  <dialog id="settingsDialog" class="settings-dialog">
    <form id="settingsForm" method="dialog" class="settings-form">
      <h2>Настройки</h2>
      <p>Числа для подмены сотых при каждом «Стоп», через запятую (0-99).</p>
      <input id="sequenceInput" type="text" inputmode="numeric" placeholder="18,26,15" autocomplete="off" required>
      <p class="hint">Текущая последовательность: <span id="currentSequence">18,26,15</span></p>
      <p id="settingsError" class="error" role="alert"></p>
      <div class="settings-actions">
        <button type="button" id="cancelSettings" class="btn btn-secondary">Отмена</button>
        <button type="submit" class="btn btn-primary">Сохранить</button>
      </div>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
