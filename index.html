<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f2f3f7">
  <title>Секундомер</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="top-bar">
      <h1>Секундомер</h1>
      <div class="menu-wrap">
        <button id="menuButton" class="menu-btn" aria-label="Открыть меню" title="Меню">⋮</button>
        <div id="popupMenu" class="popup-menu" hidden>
          <button id="openSettings" class="popup-item" type="button">Настройки</button>
        </div>
      </div>
    </header>

    <section class="display-wrap" aria-live="polite">
      <div id="timeDisplay" class="time-display">00:00,00</div>
    </section>

    <section class="controls">
      <button id="resetButton" class="btn btn-secondary" disabled>Сбросить</button>
      <button id="mainButton" class="btn btn-primary">Начать</button>
    </section>

    <nav class="bottom-nav" aria-label="Разделы часов">
      <div class="nav-item">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 8a1 1 0 0 1 1 1v3.5l2.2 1.3a1 1 0 1 1-1 1.7l-2.7-1.6a1 1 0 0 1-.5-.9V9a1 1 0 0 1 1-1Zm0-6a8 8 0 0 1 8 8v1h1a1 1 0 1 1 0 2h-1v1a8 8 0 1 1-16 0v-1H3a1 1 0 1 1 0-2h1v-1a8 8 0 0 1 8-8Zm0 2a6 6 0 0 0-6 6v4a6 6 0 1 0 12 0v-4a6 6 0 0 0-6-6Z"/></svg>
        <span>Будильник</span>
      </div>
      <div class="nav-item">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a10 10 0 1 1 0 20 10 10 0 0 1 0-20Zm7.9 9h-3.1a14 14 0 0 0-1.2-5A8 8 0 0 1 19.9 11Zm-7.9 9c1 0 2.4-1.6 3.2-4h-6.4c.8 2.4 2.2 4 3.2 4Zm-3.7-6h7.4c.2-1 .3-2 .3-3s-.1-2-.3-3H8.3c-.2 1-.3 2-.3 3s.1 2 .3 3Zm-4.2-3h3.1c0-1.8.4-3.5 1.2-5A8 8 0 0 0 4.1 11Zm4.3 7a14 14 0 0 1-1.2-5H4.1a8 8 0 0 0 4.3 5Zm7.2 0a8 8 0 0 0 4.3-5h-3.1c-.1 1.8-.5 3.5-1.2 5ZM12 4c-1 0-2.4 1.6-3.2 4h6.4c-.8-2.4-2.2-4-3.2-4Z"/></svg>
        <span>Мир. время</span>
      </div>
      <div class="nav-item active">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 2h6a1 1 0 1 1 0 2h-1v2.1A8 8 0 1 1 10 6.1V4H9a1 1 0 1 1 0-2Zm3 6a1 1 0 0 1 1 1v4l2.3 1.4a1 1 0 0 1-1 1.7l-2.8-1.7a1 1 0 0 1-.5-.9V9a1 1 0 0 1 1-1Zm0 12a6 6 0 1 0 0-12 6 6 0 0 0 0 12Z"/></svg>
        <span>Секундомер</span>
      </div>
      <div class="nav-item">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 2h10a1 1 0 0 1 .8 1.6L13.2 10l4.6 6.4A1 1 0 0 1 17 18H7a1 1 0 0 1-.8-1.6L10.8 10 6.2 3.6A1 1 0 0 1 7 2Zm1.9 2 4 5.5a1 1 0 0 1 0 1.2l-4 5.3h6.2l-3.7-5.2a1 1 0 0 1 0-1.2L15.1 4H8.9Z"/></svg>
        <span>Таймер</span>
      </div>
    </nav>
  </main>

  <dialog id="settingsDialog" class="settings-dialog">
    <form id="settingsForm" method="dialog" class="settings-form">
      <h2>Настройки</h2>
      <p>Числа для подмены сотых при каждом «Стоп», через запятую (0-99).</p>
      <input id="sequenceInput" type="text" inputmode="numeric" placeholder="18,26,15" autocomplete="off" required>
      <p class="hint">Текущая последовательность: <span id="currentSequence">18,26,15</span></p>
      <p id="settingsError" class="error" role="alert"></p>
      <div class="settings-actions">
        <button type="button" id="cancelSettings" class="btn btn-secondary">Отмена</button>
        <button type="submit" class="btn btn-primary">Сохранить</button>
      </div>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
