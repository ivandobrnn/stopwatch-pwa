<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no, maximum-scale=1">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>calctim</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app" id="appRoot">
    <section class="display-wrap" aria-live="polite">
      <div id="timeDisplay" class="time-display">00:00,00</div>
    </section>

    <section class="controls-row">
      <button id="leftButton" class="round-button round-gray">Круг</button>
      <div class="center-dots" aria-hidden="true"><span></span><span></span></div>
      <button id="mainButton" class="round-button round-green">Старт</button>
    </section>

    <section class="laps-wrap">
      <ul id="lapsList" class="laps-list"></ul>
    </section>

    <nav class="bottom-nav" aria-label="Разделы">
      <div class="nav-pill">
        <button id="worldClockButton" class="nav-item nav-button" type="button" title="Открыть настройки сотых">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="8.5"></circle>
            <path d="M3.8 12h16.4M12 3.5c2.2 2.2 3.4 5.2 3.4 8.5S14.2 18.3 12 20.5M12 3.5c-2.2 2.2-3.4 5.2-3.4 8.5s1.2 6.3 3.4 8.5M6.5 7.5h11M6.5 16.5h11"></path>
          </svg>
          <span>Мировые часы</span>
        </button>
        <div class="nav-item">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="13" r="7.5"></circle>
            <path d="M7 4l-2.1 2M17 4l2.1 2M12 9.2v3.9l2.8 1.8"></path>
          </svg>
          <span>Будильники</span>
        </div>
        <div class="nav-item active">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="13" r="6.5"></circle>
            <path d="M10 3h4M12 6v1.2M12 10.3v3.7"></path>
          </svg>
          <span>Секундомер</span>
        </div>
        <div class="nav-item">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M16.8 5.4A7.8 7.8 0 1112 4.2"></path>
            <path d="M16.8 2.8v3.6h-3.6"></path>
            <path d="M12 8.8v3.8"></path>
          </svg>
          <span>Таймеры</span>
        </div>
      </div>
    </nav>
  </main>

  <dialog id="settingsDialog" class="settings-dialog">
    <form id="settingsForm" method="dialog" class="settings-form">
      <h2>Настройки сотых</h2>
      <p>Последовательность значений для «Стоп» (0-99, через запятую).</p>
      <input id="sequenceInput" type="text" inputmode="numeric" placeholder="18,26,15" required>
      <p class="hint">Текущая: <span id="currentSequence">18,26,15</span></p>
      <p id="settingsError" class="error" role="alert"></p>
      <div class="settings-actions">
        <button type="button" id="cancelSettings" class="sheet-btn secondary">Отмена</button>
        <button type="submit" class="sheet-btn primary">Сохранить</button>
      </div>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
