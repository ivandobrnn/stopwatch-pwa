<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>calctim</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="top-row">
      <button id="menuButton" class="menu-button" aria-label="Меню">⋯</button>
      <div id="popupMenu" class="popup-menu" hidden>
        <button id="openSettings" class="popup-item" type="button">Настройки сотых</button>
      </div>
    </header>

    <section class="display-wrap" aria-live="polite">
      <div id="timeDisplay" class="time-display">00:00,00</div>
    </section>

    <section class="controls-row">
      <button id="leftButton" class="round-button round-gray">Круг</button>
      <div class="center-dots" aria-hidden="true"><span></span><span></span></div>
      <button id="mainButton" class="round-button round-green">Старт</button>
    </section>

    <section class="laps-wrap">
      <ul id="lapsList" class="laps-list"></ul>
    </section>

    <nav class="bottom-nav" aria-label="Разделы">
      <div class="nav-pill">
        <div class="nav-item">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a10 10 0 100 20 10 10 0 000-20Zm8 9h-3.1a14 14 0 00-1.2-5A8 8 0 0120 11Zm-8-7c1 0 2.4 1.6 3.2 4H8.8C9.6 5.6 11 4 12 4Zm-3.6 6h7.2c.2 1 .4 2 .4 3s-.2 2-.4 3H8.4c-.2-1-.4-2-.4-3s.2-2 .4-3Zm-4.4 3h3.1c0-1.8.4-3.5 1.2-5A8 8 0 004 13Zm4.3 7A14 14 0 017.1 13H4a8 8 0 004.3 7Zm7.3 0a8 8 0 004.3-7h-3.1a14 14 0 01-1.2 7ZM12 20c-1 0-2.4-1.6-3.2-4h6.4c-.8 2.4-2.2 4-3.2 4Z"/></svg>
          <span>Мировые часы</span>
        </div>
        <div class="nav-item">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 2a1 1 0 000 2h1l-1 2.2A8 8 0 004 12a8 8 0 1016 0 8 8 0 00-3-6.3L16 4h1a1 1 0 100-2H7Zm5 6a1 1 0 011 1v3.6l2 1.2a1 1 0 01-1 1.8l-2.5-1.5a1 1 0 01-.5-.9V9a1 1 0 011-1Z"/></svg>
          <span>Будильники</span>
        </div>
        <div class="nav-item active">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 2h6a1 1 0 110 2h-1v2.1A8 8 0 1110 6.1V4H9a1 1 0 110-2Zm3 6a1 1 0 011 1v4l2.3 1.4a1 1 0 11-1 1.7l-2.8-1.7a1 1 0 01-.5-.9V9a1 1 0 011-1Zm0 12a6 6 0 100-12 6 6 0 000 12Z"/></svg>
          <span>Секундомер</span>
        </div>
        <div class="nav-item">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 2h10a1 1 0 01.8 1.6L13.2 10l4.6 6.4A1 1 0 0117 18H7a1 1 0 01-.8-1.6L10.8 10 6.2 3.6A1 1 0 017 2Zm1.9 2 4 5.5a1 1 0 010 1.2l-4 5.3h6.2l-3.7-5.2a1 1 0 010-1.2L15.1 4H8.9Z"/></svg>
          <span>Таймеры</span>
        </div>
      </div>
    </nav>
  </main>

  <dialog id="settingsDialog" class="settings-dialog">
    <form id="settingsForm" method="dialog" class="settings-form">
      <h2>Настройки сотых</h2>
      <p>Последовательность значений для «Стоп» (0-99, через запятую).</p>
      <input id="sequenceInput" type="text" inputmode="numeric" placeholder="18,26,15" required>
      <p class="hint">Текущая: <span id="currentSequence">18,26,15</span></p>
      <p id="settingsError" class="error" role="alert"></p>
      <div class="settings-actions">
        <button type="button" id="cancelSettings" class="sheet-btn secondary">Отмена</button>
        <button type="submit" class="sheet-btn primary">Сохранить</button>
      </div>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
